# Example Render Blueprint for the backend. Review plans, regions, secrets, and
# current Blueprint schema before applying it to a production account.

databases:
  - name: pricetracker-postgres
    databaseName: pricetracker
    user: pricetracker
    plan: basic-256mb
    region: oregon
    postgresMajorVersion: "18"
    ipAllowList: []

services:
  - type: keyvalue
    name: pricetracker-redis
    plan: starter
    region: oregon
    ipAllowList: []
    maxmemoryPolicy: noeviction

  - type: web
    name: pricetracker-api
    runtime: docker
    plan: starter
    region: oregon
    dockerContext: ./apps/api
    dockerfilePath: ./apps/api/Dockerfile
    dockerCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --proxy-headers
    preDeployCommand: alembic upgrade head
    healthCheckPath: /readyz
    autoDeployTrigger: checksPass
    envVars:
      - key: PRICETRACKER_ENVIRONMENT
        value: production
      - key: PRICETRACKER_SERVICE_ROLE
        value: api
      - key: PRICETRACKER_DEBUG
        value: "false"
      - key: PRICETRACKER_LOG_LEVEL
        value: INFO
      - key: PRICETRACKER_DATABASE_URL
        fromDatabase:
          name: pricetracker-postgres
          property: connectionString
      - key: PRICETRACKER_REDIS_URL
        fromService:
          type: keyvalue
          name: pricetracker-redis
          property: connectionString
      - key: PRICETRACKER_CELERY_BROKER_URL
        fromService:
          type: keyvalue
          name: pricetracker-redis
          property: connectionString
      - key: PRICETRACKER_CELERY_RESULT_BACKEND
        fromService:
          type: keyvalue
          name: pricetracker-redis
          property: connectionString
      - key: PRICETRACKER_FRONTEND_BASE_URL
        sync: false
      - key: PRICETRACKER_ALLOWED_ORIGINS
        sync: false
      - key: PRICETRACKER_CLERK_ISSUER
        sync: false
      - key: PRICETRACKER_CLERK_AUDIENCE
        value: pricetracker-api
      - key: PRICETRACKER_CLERK_AUTHORIZED_PARTIES
        sync: false
      - key: PRICETRACKER_CLERK_WEBHOOK_SECRET
        sync: false
      - key: PRICETRACKER_FAKE_AUTH_ENABLED
        value: "false"
      - key: PRICETRACKER_FAKE_PROVIDER_ENABLED
        value: "false"
      - key: PRICETRACKER_BRIGHT_DATA_WEBHOOK_SECRET
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: OTEL_EXPORTER_OTLP_ENDPOINT
        sync: false

  - type: worker
    name: pricetracker-worker
    runtime: docker
    plan: starter
    region: oregon
    dockerContext: ./apps/api
    dockerfilePath: ./apps/api/Dockerfile
    dockerCommand: celery -A app.workers.celery_app worker --loglevel=INFO
    autoDeployTrigger: checksPass
    envVars:
      - key: PRICETRACKER_ENVIRONMENT
        value: production
      - key: PRICETRACKER_SERVICE_ROLE
        value: worker
      - key: PRICETRACKER_DATABASE_URL
        fromDatabase:
          name: pricetracker-postgres
          property: connectionString
      - key: PRICETRACKER_REDIS_URL
        fromService:
          type: keyvalue
          name: pricetracker-redis
          property: connectionString
      - key: PRICETRACKER_CELERY_BROKER_URL
        fromService:
          type: keyvalue
          name: pricetracker-redis
          property: connectionString
      - key: PRICETRACKER_CELERY_RESULT_BACKEND
        fromService:
          type: keyvalue
          name: pricetracker-redis
          property: connectionString
      - key: PRICETRACKER_FAKE_PROVIDER_ENABLED
        value: "false"
      - key: PRICETRACKER_BRIGHT_DATA_API_TOKEN
        sync: false
      - key: PRICETRACKER_BRIGHT_DATA_AMAZON_DATASET_ID
        sync: false
      - key: PRICETRACKER_BRIGHT_DATA_EBAY_DATASET_ID
        sync: false
      - key: PRICETRACKER_BRIGHT_DATA_WEBHOOK_URL
        sync: false
      - key: PRICETRACKER_BRIGHT_DATA_WEBHOOK_SECRET
        sync: false
      - key: PRICETRACKER_RESEND_API_KEY
        sync: false
      - key: PRICETRACKER_EMAIL_FROM
        sync: false
      - key: PRICETRACKER_TRACKING_INTERVAL_HOURS
        value: "6"
      - key: PRICETRACKER_TRACKING_JITTER_MINUTES
        value: "30"
      - key: PRICETRACKER_PRODUCT_LEASE_MINUTES
        value: "15"
      - key: PRICETRACKER_PROVIDER_JOB_STALE_MINUTES
        value: "45"
      - key: PRICETRACKER_PROVIDER_MAX_ATTEMPTS
        value: "5"
      - key: PRICETRACKER_ALERT_REARM_PERCENT
        value: "3"
      - key: SENTRY_DSN
        sync: false
      - key: OTEL_EXPORTER_OTLP_ENDPOINT
        sync: false

  - type: worker
    name: pricetracker-scheduler
    runtime: docker
    plan: starter
    region: oregon
    dockerContext: ./apps/api
    dockerfilePath: ./apps/api/Dockerfile
    dockerCommand: celery -A app.workers.celery_app beat --loglevel=INFO --pidfile=/tmp/celerybeat.pid --schedule=/tmp/celerybeat-schedule
    autoDeployTrigger: checksPass
    envVars:
      - key: PRICETRACKER_ENVIRONMENT
        value: production
      - key: PRICETRACKER_SERVICE_ROLE
        value: scheduler
      - key: PRICETRACKER_DATABASE_URL
        fromDatabase:
          name: pricetracker-postgres
          property: connectionString
      - key: PRICETRACKER_REDIS_URL
        fromService:
          type: keyvalue
          name: pricetracker-redis
          property: connectionString
      - key: PRICETRACKER_CELERY_BROKER_URL
        fromService:
          type: keyvalue
          name: pricetracker-redis
          property: connectionString
      - key: PRICETRACKER_CELERY_RESULT_BACKEND
        fromService:
          type: keyvalue
          name: pricetracker-redis
          property: connectionString
      - key: PRICETRACKER_FAKE_PROVIDER_ENABLED
        value: "false"
      - key: PRICETRACKER_TRACKING_INTERVAL_HOURS
        value: "6"
      - key: SENTRY_DSN
        sync: false
      - key: OTEL_EXPORTER_OTLP_ENDPOINT
        sync: false

