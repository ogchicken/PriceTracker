name: pricetracker

x-api-service: &api-service
  build:
    context: ../apps/api
    dockerfile: Dockerfile
  env_file:
    - ../.env
  environment:
    PRICETRACKER_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-pricetracker}:${POSTGRES_PASSWORD:-change-me-locally}@postgres:5432/${POSTGRES_DB:-pricetracker}
    PRICETRACKER_REDIS_URL: redis://redis:6379/0
    PRICETRACKER_CELERY_BROKER_URL: redis://redis:6379/1
    PRICETRACKER_CELERY_RESULT_BACKEND: redis://redis:6379/2
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  restart: unless-stopped
  networks:
    - app

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pricetracker}
      POSTGRES_USER: ${POSTGRES_USER:-pricetracker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-locally}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - app

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "noeviction"]
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      - app

  migrate:
    <<: *api-service
    profiles: ["ops"]
    restart: "no"
    command: ["alembic", "upgrade", "head"]

  api:
    <<: *api-service
    command:
      [
        "uvicorn",
        "app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--proxy-headers",
      ]
    ports:
      - "127.0.0.1:${API_PORT:-8000}:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz', timeout=3)",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  worker:
    <<: *api-service
    command:
      [
        "celery",
        "-A",
        "app.workers.celery_app",
        "worker",
        "--loglevel=INFO",
        "--concurrency=${WORKER_CONCURRENCY:-2}",
      ]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "celery -A app.workers.celery_app inspect ping -d celery@$${HOSTNAME} --timeout=5 | grep -q pong",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  scheduler:
    <<: *api-service
    command:
      [
        "celery",
        "-A",
        "app.workers.celery_app",
        "beat",
        "--loglevel=INFO",
        "--pidfile=/tmp/celerybeat.pid",
        "--schedule=/tmp/celerybeat-schedule",
      ]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "test -s /tmp/celerybeat.pid && kill -0 $$(cat /tmp/celerybeat.pid)",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      args:
        API_BASE_URL: http://api:8000
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}
    env_file:
      - ../.env
    environment:
      API_BASE_URL: http://api:8000
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-}
      CLERK_JWT_TEMPLATE_NAME: ${CLERK_JWT_TEMPLATE_NAME:-pricetracker-api}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "127.0.0.1:${WEB_PORT:-3000}:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped
    networks:
      - app

  caddy:
    image: caddy:2-alpine
    profiles: ["prod"]
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
      ACME_EMAIL: ${ACME_EMAIL:-}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app

  mailpit:
    image: axllent/mailpit:v1.27
    profiles: ["dev"]
    ports:
      - "127.0.0.1:${MAILPIT_SMTP_PORT:-1025}:1025"
      - "127.0.0.1:${MAILPIT_UI_PORT:-8025}:8025"
    healthcheck:
      test: ["CMD", "/mailpit", "readyz"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - app

volumes:
  postgres-data:
  redis-data:
  caddy-data:
  caddy-config:

networks:
  app:
    driver: bridge
