name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: pricetracker_test
          POSTGRES_USER: pricetracker
          POSTGRES_PASSWORD: pricetracker
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pricetracker -d pricetracker_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    defaults:
      run:
        working-directory: apps/api
    env:
      PRICETRACKER_ENVIRONMENT: test
      PRICETRACKER_FAKE_AUTH_ENABLED: "true"
      PRICETRACKER_FAKE_PROVIDER_ENABLED: "true"
      PRICETRACKER_DATABASE_URL: postgresql+asyncpg://pricetracker:pricetracker@localhost:5432/pricetracker_test
      PRICETRACKER_REDIS_URL: redis://localhost:6379/0
      PRICETRACKER_CELERY_BROKER_URL: redis://localhost:6379/1
      PRICETRACKER_CELERY_RESULT_BACKEND: redis://localhost:6379/2
      PRICETRACKER_CLERK_ISSUER: https://test.clerk.accounts.dev
      PRICETRACKER_CLERK_AUDIENCE: pricetracker-api
      PRICETRACKER_CLERK_WEBHOOK_SECRET: whsec_ci_placeholder
      PRICETRACKER_BRIGHT_DATA_WEBHOOK_SECRET: ci-placeholder
    steps:
      - uses: actions/checkout@v7

      - name: Install uv and Python
        uses: astral-sh/setup-uv@v7
        with:
          version: latest
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: apps/api/pyproject.toml

      - name: Install backend dependencies
        run: uv sync --extra dev

      - name: Lint backend
        run: |
          uv run --with ruff ruff check .
          uv run --with ruff ruff format --check .

      - name: Type-check backend
        run: uv run --with mypy mypy .

      - name: Apply migrations to clean database
        run: uv run alembic upgrade head

      - name: Test backend
        run: |
          mkdir -p ../../reports
          uv run pytest --junitxml=../../reports/backend-junit.xml

      - name: Check generated API contract
        run: uv run python scripts/export_openapi.py --check

      - name: Upload backend test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-report
          path: reports/backend-junit.xml
          if-no-files-found: ignore

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Check generated frontend API types
        run: |
          pnpm --dir apps/web generate:api
          git diff --exit-code -- apps/web/src/lib/api/contract.ts

      - name: Lint frontend
        run: pnpm --dir apps/web lint

      - name: Type-check frontend
        run: pnpm --dir apps/web typecheck

      - name: Test frontend
        run: pnpm --dir apps/web test

      - name: Build frontend
        env:
          API_BASE_URL: http://localhost:8000
          NEXT_PUBLIC_DEMO_MODE: "true"
        run: pnpm --dir apps/web build

      - name: Install Playwright browser
        run: pnpm --dir apps/web exec playwright install --with-deps chromium

      - name: Test frontend end-to-end
        run: pnpm --dir apps/web test:e2e

  containers:
    name: Compose and container checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Configure Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Prepare validation environment
        run: cp .env.example .env

      - name: Validate Compose configuration
        run: docker compose --env-file .env -f infra/compose.yaml config --quiet

      - name: Build application images
        run: docker compose --env-file .env -f infra/compose.yaml build api worker scheduler web

