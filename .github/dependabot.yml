version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 10
    groups:
      frontend-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: pip
    directory: /apps/api
    schedule:
      interval: weekly
      day: monday
      time: "06:15"
      timezone: Etc/UTC
    open-pull-requests-limit: 10
    groups:
      backend-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: docker
    directory: /infra
    schedule:
      interval: weekly
      day: monday
      time: "06:30"
      timezone: Etc/UTC
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:45"
      timezone: Etc/UTC
    open-pull-requests-limit: 5

